name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: AssetGuardianMobile/package-lock.json

    - name: Setup Java
      uses: actions/setup-java@v3
      with:
        distribution: 'zulu'
        java-version: '17'
        cache: 'gradle'

    - name: Install npm dependencies
      working-directory: ./AssetGuardianMobile
      run: npm install

    - name: Build Android APK
      working-directory: ./AssetGuardianMobile/android
      run: |
        chmod +x ./gradlew
        ./gradlew assembleDebug --no-daemon

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v3
      with:
        name: AssetGuardian-APK
        path: AssetGuardianMobile/android/app/build/outputs/apk/debug/app-debug.apk
